name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  schedule:
    - cron: "0 0 * * 0"  # Runs every Sunday at midnight UTC

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fetch-python-versions:
    runs-on: ubuntu-latest
    outputs:
      supported_versions: ${{ steps.fetch-versions.outputs.supported_versions }}
      bound_versions: ${{ steps.fetch-versions.outputs.bound_versions }}
    steps:
      - name: Fetch Supported Python
        id: fetch-versions
        run: |
          versions=$(curl -fsSL https://endoflife.date/api/v1/products/python/ \
                     | jq '[ .result.releases[] | select(.isEol == false) | .label ]')

          echo "supported_versions=$(echo $versions | jq -c '.')"        >> $GITHUB_OUTPUT
          echo "bound_versions=$(echo $versions | jq -c '[.[0],.[-1]]')" >> $GITHUB_OUTPUT

  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Install gfortran (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc
          echo "$(brew --prefix gcc)/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheels
        env:
          CIBW_ARCHS_LINUX: x86_64 i686 aarch64 ppc64le s390x
          CIBW_ARCHS_MACOS: arm64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_ENVIRONMENT_MACOS: "PATH=/opt/homebrew/bin:$PATH"

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheels/*.whl

  test:
    name: Test wheels (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: [fetch-python-versions, build]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version: ${{ fromJson(needs.fetch-python-versions.outputs.supported_versions) }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: wheels-${{ matrix.os }}
          path: wheels

      - name: Install wheel and test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          # Install the wheel matching this Python version; fall back to any available
          python -m pip install --find-links=wheels --no-index sdepack || \
            python -m pip install --find-links=wheels sdepack

      - name: Run tests
        run: python -m pytest tests/ -v
